<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>MyVerse 관리자 · 분석</title>
<style>
:root{color-scheme:light dark}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Apple SD Gothic Neo',sans-serif;background:#fafafa;color:#111}
@media(prefers-color-scheme:dark){body{background:#0b0b0c;color:#eee}.card,.stat,.chart,.kpi,.panel,.modal-box,.ret{background:#161618 !important;border-color:#26262a !important}.thumb,.pimg,.pfimg{background:#26262a}.bar-bg{fill:#26262a}table{border-color:#26262a}th{background:#1a1a1d !important}tr:hover td,tr.clk:hover td{background:#1d1d20}.badge{filter:brightness(1.1)}}
header{position:sticky;top:0;background:inherit;border-bottom:1px solid #e5e5e5;padding:12px 20px;z-index:10}
h1{font-size:18px;margin:0;font-weight:800}h2{font-size:15px;margin:18px 0 8px;font-weight:800}.muted{color:#999;font-size:13px}
.wrap{max-width:1040px;margin:0 auto;padding:14px 18px 80px}
.login{max-width:340px;margin:80px auto;text-align:center}
input,button{font-size:15px;padding:12px 14px;border-radius:10px;border:1px solid #ccc;width:100%;margin:6px 0}
button{background:#0095F6;color:#fff;border:0;font-weight:700;cursor:pointer}
.live{display:flex;align-items:center;gap:6px;font-size:12px;color:#888;margin:2px 0 8px}
.dot{width:8px;height:8px;border-radius:5px;background:#34C759;animation:p 2s infinite}@keyframes p{50%{opacity:.3}}
.kpis{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px}
.kpi{background:#fff;border:1px solid #eee;border-radius:12px;padding:10px 12px}
.kpi b{display:block;font-size:20px;font-weight:800;font-variant-numeric:tabular-nums}.kpi span{font-size:11px;color:#999}.kpi .sub{font-size:11px;color:#0095F6}
.panel{background:#fff;border:1px solid #eee;border-radius:14px;padding:14px 16px;margin-bottom:14px}
.tabs{display:flex;border-bottom:1px solid #e5e5e5;margin:0 0 12px;position:sticky;top:0;background:#fafafa;z-index:20}
@media(prefers-color-scheme:dark){.tabs{background:#0b0b0c !important;border-bottom-color:#26262a}}
.tab{flex:1;text-align:center;padding:10px;cursor:pointer;color:#999;border-bottom:2px solid transparent;font-size:14px}
.tab.on{color:inherit;font-weight:700;border-bottom-color:#0095F6}
table{width:100%;border-collapse:collapse;font-size:13px}
.scroll{overflow-x:auto}
th,td{text-align:left;padding:8px 10px;border-bottom:1px solid #eee;white-space:nowrap}
th{background:#f7f7f8;font-size:12px;color:#666}
td.n,th.n{text-align:right;font-variant-numeric:tabular-nums}
tr.clk{cursor:pointer}tr.clk:hover td{background:#f0f8ff}
.ibar{height:7px;border-radius:4px;background:#0095F6;display:inline-block;vertical-align:middle}
.fn{display:flex;align-items:center;gap:10px;margin:5px 0}
.fn .lab{width:110px;font-size:12px;flex:0 0 auto}
.fn .track{flex:1;background:rgba(128,128,128,.14);border-radius:6px;height:22px;position:relative;overflow:hidden}
.fn .fill{height:100%;background:linear-gradient(90deg,#0095F6,#34C759);border-radius:6px}
.fn .fc{position:absolute;left:8px;top:0;line-height:22px;font-size:12px;font-weight:700;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.3)}
.fn .drop{font-size:11px;color:#e53e3e;width:64px;text-align:right;flex:0 0 auto}
.rets{display:flex;gap:8px;flex-wrap:wrap}
.ret{flex:1;min-width:90px;text-align:center;background:#fff;border:1px solid #eee;border-radius:10px;padding:10px}
.ret b{display:block;font-size:20px;font-weight:800}.ret.warn b{color:#e53e3e}.ret span{font-size:11px;color:#999}
.charts{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:12px}
.chart{background:#fff;border:1px solid #eee;border-radius:12px;padding:10px 12px}
.chart .ct{font-size:13px;font-weight:700;margin-bottom:4px;display:flex;justify-content:space-between}.chart .ct em{font-style:normal;color:#999;font-weight:400}
.ev{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #f0f0f0;font-size:13px}
.badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;color:#fff;flex:0 0 auto;width:64px;text-align:center}
.ev .who{font-weight:600;flex:0 0 auto}.ev .tx{color:#666;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.ev .tm{color:#aaa;font-size:11px;flex:0 0 auto}
.card{background:#fff;border:1px solid #eee;border-radius:12px;padding:12px 14px;margin-bottom:10px}
.phead{display:flex;align-items:center;gap:8px;margin-bottom:6px}.phead b{font-size:14px}.phead .t{margin-left:auto;color:#999;font-size:12px}
.thumbs{display:flex;gap:6px;margin:6px 0;flex-wrap:wrap}.thumb{width:96px;height:96px;object-fit:cover;border-radius:10px;background:#eee}
.content{font-size:14px;line-height:1.5;white-space:pre-wrap}
.pgal{display:flex;gap:8px;overflow-x:auto;padding:8px 0}.pimg{width:110px;height:138px;object-fit:cover;border-radius:10px;flex:0 0 auto;background:#eee}.pimg:first-child{outline:2px solid #0095F6}
.pbio{font-size:14px;margin:6px 0}.pfacts,.pface{font-size:12px;color:#666;background:#f4f4f5;border-radius:8px;padding:7px 9px;margin-top:6px;line-height:1.45}.pfacts b,.pface b{color:#0095F6;margin-right:4px}
@media(prefers-color-scheme:dark){.pfacts,.pface{background:#1f1f22;color:#bbb}th{background:#1a1a1d}}
.dpost{border:1px solid #eee;border-radius:12px;padding:10px;margin-bottom:10px}
.dthumbs{display:flex;gap:6px;overflow-x:auto;margin-bottom:8px;position:relative}.dthumb{width:120px;height:150px;object-fit:cover;border-radius:8px;flex:0 0 auto;background:#eee}
.nph{position:absolute;top:6px;right:6px;background:rgba(0,0,0,.65);color:#fff;font-size:11px;font-weight:700;padding:2px 7px;border-radius:20px}
.dpc{font-size:14px;line-height:1.5;white-space:pre-wrap}.dpmeta{font-size:12px;color:#999;margin-top:5px}
@media(prefers-color-scheme:dark){.dpost{border-color:#26262a}.dthumb{background:#26262a}}
.pfeed{display:flex;gap:8px;overflow-x:auto;margin-top:8px}.pf{flex:0 0 150px;border:1px solid #eee;border-radius:10px;overflow:hidden}.pfimg{width:100%;height:100px;object-fit:cover;display:block;background:#eee}.pfx{padding:6px 8px}.pfc{font-size:12px;line-height:1.4}.ploc{font-size:11px;color:#0095F6;margin-top:3px}
.err{color:#e53e3e;font-size:13px}
.row{display:flex;gap:8px;margin-top:10px}
.okbtn,.nobtn{width:auto;flex:1;padding:10px 14px;border-radius:10px;border:0;font-weight:700;cursor:pointer;font-size:14px}
.okbtn{background:#0a7d33;color:#fff}.nobtn{background:#e53e3e;color:#fff}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-start;justify-content:center;padding:24px 12px;z-index:50;overflow-y:auto}
.modal-box{background:#fff;border:1px solid #eee;border-radius:16px;max-width:760px;width:100%;padding:18px 20px;margin:auto}
.mx{float:right;font-size:22px;cursor:pointer;color:#999;background:none;border:0;width:auto;padding:0;margin:0}
</style></head><body>
<div id="app"><div class="login" id="login">
  <h1>MyVerse 관리자</h1><p class="muted">분석 대시보드</p>
  <input id="email" placeholder="이메일" autocomplete="username" onkeydown="if(event.key==='Enter')login()">
  <input id="pw" type="password" placeholder="비밀번호" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()">
  <button id="loginBtn" onclick="login()">로그인</button>
  <p class="err" id="err"></p><p class="muted">관리자 계정만 접근할 수 있어요.</p>
</div></div>
<script>
const URL_="https://kjztmyosougifuneyhqw.supabase.co",ANON="sb_publishable_0SXwirhFLFZ_kqp41GcP0g_cILZcP3E";
let TOKEN=sessionStorage.getItem('mv_at')||'',TAB='분석',timer,LAST=null,modalOpen=false,AUDIT=null,AUDIT_BUSY=false,PEND=null,PEND_BUSY=false,TRAIN=null,TRAIN_BUSY=false;
async function login(){
  const email=document.getElementById('email').value.trim(),pw=document.getElementById('pw').value;
  document.getElementById('err').textContent='';
  const r=await fetch(URL_+'/auth/v1/token?grant_type=password',{method:'POST',headers:{apikey:ANON,'Content-Type':'application/json'},body:JSON.stringify({email,password:pw})});
  const j=await r.json();
  if(!j.access_token){document.getElementById('err').textContent='로그인 실패: '+(j.error_description||j.msg||'확인');return}
  TOKEN=j.access_token;sessionStorage.setItem('mv_at',TOKEN);start();
}
async function api(body){
  const r=await fetch(URL_+'/functions/v1/admin-activity',{method:'POST',headers:{apikey:ANON,Authorization:'Bearer '+TOKEN,'Content-Type':'application/json'},body:JSON.stringify(body||{})});
  if(r.status===403)throw'forbidden';if(r.status===401)throw'unauth';return r.json();
}
function esc(s){return(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
// 이미지 src 전용: 우리 스토리지 URL만 허용 + 이스케이프 (유저가 쓸 수 있는 media_urls 경유 XSS 차단)
function simg(u){u=String(u||'');return u.indexOf('https://kjztmyosougifuneyhqw.supabase.co/storage/')===0?esc(u):''}
function rel(iso){if(!iso)return'';const s=(Date.now()-new Date(iso))/1000;if(s<60)return'방금';if(s<3600)return Math.floor(s/60)+'분';if(s<86400)return Math.floor(s/3600)+'시간';if(s<604800)return Math.floor(s/86400)+'일';return Math.floor(s/604800)+'주'}
const N=n=>(n||0).toLocaleString('en-US');
const D=n=>'$'+(n||0).toFixed(4);
const pimgs=x=>(Array.isArray(x.image_urls)&&x.image_urls.length?x.image_urls:(x.image_url?[x.image_url]:[])).filter(Boolean);
function dpost(x){const im=pimgs(x).map(simg).filter(Boolean);return'<div class="dpost">'+(im.length?'<div class="dthumbs">'+im.map(u=>'<img class="dthumb" src="'+u+'" loading="lazy">').join('')+(im.length>1?'<span class="nph">'+im.length+'장</span>':'')+'</div>':'')+'<div class="dpc">'+esc(x.content||'(사진)')+'</div><div class="dpmeta">'+(x.location?'📍'+esc(x.location)+' · ':'')+(x.like_count!=null?'❤ '+x.like_count+' · ':'')+rel(x.created_at)+' 전</div></div>'}
function kpi(b,l,sub){return'<div class="kpi"><b>'+b+'</b><span>'+l+'</span>'+(sub?'<div class="sub">'+sub+'</div>':'')+'</div>'}
// SVG 막대 (일자/시간대)
function bars(data,keys,colors,labelIdx){
  const n=data.length,W=100,H=40,bw=W/n,max=Math.max(1,...data.map(d=>keys.reduce((a,k)=>a+(d[k]||0),0)));
  let g='';
  data.forEach((d,i)=>{let y=H,x=i*bw+bw*0.12,w=bw*0.76;
    g+='<rect class="bar-bg" x="'+x.toFixed(2)+'" y="0" width="'+w.toFixed(2)+'" height="'+H+'" rx="0.5" fill="#eee"/>';
    keys.forEach((k,ki)=>{const h=((d[k]||0)/max)*H;if(h>0){y-=h;g+='<rect x="'+x.toFixed(2)+'" y="'+y.toFixed(2)+'" width="'+w.toFixed(2)+'" height="'+h.toFixed(2)+'" fill="'+colors[ki]+'"><title>'+(d.label||d.date||d.hour)+' '+k+':'+d[k]+'</title></rect>'}});
  });
  let ax='';(labelIdx||[]).forEach(i=>{ax+='<span>'+(data[i].label!=null?data[i].label:(data[i].hour!=null?data[i].hour+'시':data[i].date))+'</span>'});
  return'<svg viewBox="0 0 100 40" preserveAspectRatio="none" style="width:100%;height:70px;display:block">'+g+'</svg><div class="muted" style="display:flex;justify-content:space-between;font-size:10px;margin-top:2px">'+ax+'</div>';
}
function chartCard(title,sub,svg){return'<div class="chart"><div class="ct"><span>'+title+'</span><em>'+sub+'</em></div>'+svg+'</div>'}
function tbl(head,rows){return'<div class="scroll"><table><thead><tr>'+head+'</tr></thead><tbody>'+rows+'</tbody></table></div>'}

function analytics(d){
  const s=d.stats;
  let h='<div class="kpis">'
    +kpi(N(s.users),'유저',s.newUsers7d?('+'+s.newUsers7d+' 신규(7일)'):'')
    +kpi(N(s.personas),'페르소나')
    +kpi(N(s.postsTotal),'게시물','오늘 '+s.postsToday)
    +kpi(N(s.dmsUser),'DM 발신','받음 '+N(s.dmsPersona))
    +kpi(N(s.likes),'좋아요')+kpi(N(s.matches),'매칭')
    +kpi(N(s.relationships),'관계','팔로우 '+s.follows)
    +kpi(N(s.aiCallsToday),'AI콜 오늘','7일 '+N(s.aiCalls7d))
    +kpi(D(s.aiCostToday),'AI비용 오늘','총 '+D(s.aiCostTotal))
    +kpi(N(s.aiTokensTotal),'AI 토큰 누적')
    +'</div>';
  // 퍼널
  const f=d.funnel||[],fmax=Math.max(1,...f.map(x=>x.count));
  h+='<div class="panel"><h2>🔻 퍼널 (이탈 분석)</h2>';
  f.forEach((st,i)=>{const prev=i>0?f[i-1].count:st.count;const conv=prev?Math.round(st.count/prev*100):100;const drop=prev-st.count;
    h+='<div class="fn"><div class="lab">'+esc(st.stage)+'</div><div class="track"><div class="fill" style="width:'+(st.count/fmax*100)+'%"></div><div class="fc">'+N(st.count)+(i>0?' · '+conv+'%':'')+'</div></div><div class="drop">'+(i>0&&drop>0?'▼'+drop+'명 이탈':'')+'</div></div>';
  });
  h+='</div>';
  // 리텐션
  const r=d.retention||{};
  h+='<div class="panel"><h2>🔁 리텐션</h2><div class="rets">'
    +'<div class="ret"><b>'+r.dau+'</b><span>DAU (오늘 활성)</span></div>'
    +'<div class="ret"><b>'+r.wau+'</b><span>WAU (7일)</span></div>'
    +'<div class="ret"><b>'+r.mau+'</b><span>MAU (30일)</span></div>'
    +'<div class="ret"><b>'+r.returningRate+'%</b><span>재방문율(2일+)</span></div>'
    +'<div class="ret warn"><b>'+r.churnRate+'%</b><span>이탈률(7일+ 무활동)</span></div>'
    +'</div></div>';
  // 시간대별 + 14일추이
  const hr=d.hourly||[],peak=hr.reduce((a,b)=>((b.posts+b.dms+b.swipes)>(a.posts+a.dms+a.swipes)?b:a),hr[0]||{});
  hr.forEach(x=>x.label=(x.hour%6===0||x.hour===23)?x.hour:'');
  h+='<div class="panel"><h2>🕐 시간대별 활동 (KST)</h2>'
    +chartCard('게시물·DM·스와이프','피크 '+(peak?peak.hour+'시':'-'),bars(hr,['dms','posts','swipes'],['#34C759','#0095F6','#F5A623'],[0,6,12,18,23]))
    +'<div class="muted" style="font-size:11px;margin-top:6px">🟩 DM · 🟦 게시물 · 🟧 스와이프</div></div>';
  const tl=d.timeline||[];tl.forEach(x=>x.label='');
  h+='<div class="panel"><h2>📅 일자별 추이 (14일)</h2><div class="charts">'
    +chartCard('📝 게시물','합 '+tl.reduce((a,x)=>a+x.posts,0),bars(tl,['posts'],['#0095F6'],[0,13]))
    +chartCard('💬 DM','합 '+tl.reduce((a,x)=>a+x.dms,0),bars(tl,['dms'],['#34C759'],[0,13]))
    +chartCard('🤖 AI','합 '+tl.reduce((a,x)=>a+x.ai,0),bars(tl,['ai'],['#F5A623'],[0,13]))
    +'</div></div>';
  // 기능별 사용량
  const fu=d.featureUsage||[],fumax=Math.max(1,...fu.map(x=>x.count));
  h+='<div class="panel"><h2>📊 기능별 사용량</h2>'+tbl('<th>기능</th><th class="n">횟수</th><th style="width:45%">비중</th>',
    fu.map(x=>'<tr><td>'+esc(x.feature)+'</td><td class="n">'+N(x.count)+'</td><td><span class="ibar" style="width:'+(x.count/fumax*100)+'%"></span></td></tr>').join(''))+'</div>';
  // AI 비용(함수별)
  const ac=d.aiCost||[],tot=ac.reduce((a,x)=>({calls:a.calls+x.calls,in_tokens:a.in_tokens+x.in_tokens,out_tokens:a.out_tokens+x.out_tokens,cached_tokens:a.cached_tokens+x.cached_tokens,cost:a.cost+x.cost}),{calls:0,in_tokens:0,out_tokens:0,cached_tokens:0,cost:0});
  h+='<div class="panel"><h2>💰 AI 비용 (함수별)</h2>'+tbl('<th>함수</th><th class="n">호출</th><th class="n">입력토큰</th><th class="n">출력토큰</th><th class="n">캐시</th><th class="n">비용</th>',
    ac.map(x=>'<tr><td>'+esc(x.fn)+'</td><td class="n">'+N(x.calls)+'</td><td class="n">'+N(x.in_tokens)+'</td><td class="n">'+N(x.out_tokens)+'</td><td class="n">'+N(x.cached_tokens)+'</td><td class="n">'+D(x.cost)+'</td></tr>').join('')
    +'<tr style="font-weight:700"><td>합계</td><td class="n">'+N(tot.calls)+'</td><td class="n">'+N(tot.in_tokens)+'</td><td class="n">'+N(tot.out_tokens)+'</td><td class="n">'+N(tot.cached_tokens)+'</td><td class="n">'+D(tot.cost)+'</td></tr>')+'</div>';
  // 이벤트 스트림
  const bc={post:'#0095F6',comment:'#34C759',dm_user:'#8e8e93',dm_persona:'#8e8e93',match:'#FF2D78'};
  const bl={post:'게시물',comment:'댓글',dm_user:'DM유저',dm_persona:'DM봇',match:'매칭'};
  h+='<div class="panel"><h2>⚡ 이벤트 스트림</h2>'+(d.events||[]).map(e=>'<div class="ev"><span class="badge" style="background:'+(bc[e.type]||'#999')+'">'+(bl[e.type]||e.type)+'</span><span class="who">'+esc(e.who)+'</span><span class="tx">'+esc(e.text)+'</span><span class="tm">'+rel(e.at)+'</span></div>').join('')+'</div>';
  return h;
}
function postsTab(d){return(d.posts||[]).length?d.posts.map(p=>{const im=(p.media_urls||[]).map(simg).filter(Boolean);return'<div class="card"><div class="phead"><b>'+esc(p.author)+'</b><span class="t">'+rel(p.created_at)+' 전</span></div>'+(im.length?'<div class="thumbs">'+im.map(u=>'<img class="thumb" src="'+u+'" loading="lazy">').join('')+'</div>':'')+(p.content?'<div class="content">'+esc(p.content)+'</div>':'')+(p.media_type==='poll'?'<div class="muted">📊 투표</div>':'')+'</div>'}).join(''):'<p class="muted">게시물 없음</p>'}
function usersTab(d){return'<div class="panel">'+tbl('<th>닉네임</th><th>이메일</th><th class="n">게시물</th><th class="n">DM</th><th class="n">오늘AI</th><th class="n">팔로워</th><th>활동</th>',
  (d.users||[]).map(u=>'<tr class="clk" onclick="drill(\'user\',\''+u.id+'\')"><td>'+esc(u.nickname||'-')+'</td><td class="muted">'+esc(u.email||'-')+'</td><td class="n">'+u.posts+'</td><td class="n">'+u.dms+'</td><td class="n">'+u.ai_today+'</td><td class="n">'+u.followers+'</td><td>'+rel(u.last_active)+'</td></tr>').join(''))+'<p class="muted" style="margin:8px 2px 0">행을 누르면 상세 →</p></div>'}
function gal(image,photos){const g=[image,...(photos||[])].map(simg).filter((u,i,a)=>u&&a.indexOf(u)===i);return g.length?'<div class="pgal">'+g.map((u,i)=>'<img class="pimg" src="'+u+'" loading="lazy" title="'+(i===0?'프로필':'사진'+i)+'">').join('')+'</div>':'<div class="muted">이미지 없음</div>'}
function personasTab(d){return(d.personas||[]).map(p=>{const posts=(p.recent_posts||[]).filter(x=>x.image_url||x.content);
  return'<div class="card clk" onclick="drill(\'persona\',\''+p.id+'\')"><div class="phead"><b>'+esc(p.name)+'</b> <span class="muted">@'+esc(p.handle||'')+'</span><span class="t">게시물 '+(p.post_count||0)+'</span></div>'
    +gal(p.image,p.photos)
    +(p.bio?'<div class="pbio">📝 '+esc(p.bio)+'</div>':'')
    +(p.facts?'<div class="pfacts"><b>설정</b>'+esc(p.facts)+'</div>':'')
    +(p.face?'<div class="pface"><b>외모앵커</b>'+esc(p.face)+'</div>':'')
    +(posts.length?'<div class="pfeed">'+posts.map(x=>{const im=pimgs(x).map(simg).filter(Boolean);return'<div class="pf">'+(im.length?'<div style="position:relative"><img class="pfimg" src="'+im[0]+'" loading="lazy">'+(im.length>1?'<span class="nph">'+im.length+'장</span>':'')+'</div>':'')+'<div class="pfx"><div class="pfc">'+esc((x.content||'').slice(0,60))+'</div>'+(x.location?'<div class="ploc">📍 '+esc(x.location)+'</div>':'')+'</div></div>'}).join('')+'</div>':'')
    +'</div>';}).join('')}

async function drill(kind,id){
  modalOpen=true;
  document.body.insertAdjacentHTML('beforeend','<div class="modal" id="modal" onclick="if(event.target.id==\'modal\')closeModal()"><div class="modal-box"><button class="mx" onclick="closeModal()">×</button><p class="muted">불러오는 중…</p></div></div>');
  try{const d=await api({view:kind,id});document.querySelector('#modal .modal-box').innerHTML='<button class="mx" onclick="closeModal()">×</button>'+(kind==='user'?userModal(d):personaModal(d));}
  catch(e){document.querySelector('#modal .modal-box').innerHTML='<button class="mx" onclick="closeModal()">×</button><p class="err">불러오기 실패</p>'}
}
function closeModal(){modalOpen=false;const m=document.getElementById('modal');if(m)m.remove()}
function userModal(d){const p=d.profile||{};
  let h='<h1>'+esc(p.nickname||'(닉네임 없음)')+'</h1><p class="muted">'+esc(p.email||'-')+' · 가입 '+rel(p.created_at)+' 전</p>';
  h+='<div class="kpis" style="margin:10px 0">'+kpi(N((d.posts||[]).length),'게시물')+kpi(N((d.dmThreads||[]).length),'DM 상대')+kpi(N(d.matches),'매칭')+kpi(N((d.relationships||[]).length),'관계')+'</div>';
  const pname=id=>{const p=((LAST&&LAST.personas)||[]).find(x=>x.id===id);return p?p.name:(id||'-')};
  h+='<h2>관계(페르소나별)</h2>'+tbl('<th>페르소나</th><th class="n">호감도</th><th>상태</th><th class="n">대화수</th><th>팔로우</th>',
    (d.relationships||[]).map(r=>'<tr><td>'+esc(pname(r.persona_id))+'</td><td class="n">'+(r.score??0)+'</td><td>'+esc(r.status||'-')+'</td><td class="n">'+(r.interaction_count||0)+'</td><td>'+(r.follows_user?'✓':'')+'</td></tr>').join('')||'<tr><td colspan=5 class="muted">없음</td></tr>');
  h+='<h2>AI 사용(일자별)</h2>'+tbl('<th>날짜</th><th class="n">호출</th>',(d.aiUsage||[]).slice(0,10).map(u=>'<tr><td>'+u.day+'</td><td class="n">'+u.calls+'</td></tr>').join('')||'<tr><td colspan=2 class="muted">없음</td></tr>');
  h+='<h2>최근 게시물</h2>'+((d.posts||[]).slice(0,6).map(x=>'<div class="ev"><span class="tx">'+esc((x.content||'(사진)').slice(0,70))+'</span><span class="tm">'+rel(x.created_at)+'</span></div>').join('')||'<p class="muted">없음</p>');
  return h;
}
function personaModal(d){const p=d.persona||{},av=p.avatar||{};
  let h='<h1>'+esc(p.name||'')+' <span class="muted">@'+esc(p.handle||'')+'</span></h1>';
  h+=gal(av.image,av.photos);
  h+='<div class="kpis" style="margin:10px 0">'+kpi(N(d.engagedUsers),'관계 유저')+kpi(d.avgScore,'평균 호감도')+kpi(N(d.dmThreads),'DM 스레드')+kpi(N(d.commentsMade),'단 댓글')+kpi(N(d.likesGiven),'누른 좋아요')+kpi(N(d.followsUsers),'팔로우한 유저')+'</div>';
  if(p.facts)h+='<div class="pfacts"><b>설정</b>'+esc(p.facts)+'</div>';
  if(av.face)h+='<div class="pface"><b>외모앵커</b>'+esc(av.face)+'</div>';
  h+='<h2>관계 상위 유저</h2>'+tbl('<th>유저</th><th class="n">호감도</th><th>상태</th><th class="n">대화수</th><th>팔로우</th>',
    (d.rels||[]).slice(0,15).map(r=>'<tr><td class="muted">'+esc((r.user_id||'').slice(0,8))+'…</td><td class="n">'+(r.score??0)+'</td><td>'+esc(r.status||'-')+'</td><td class="n">'+(r.interaction_count||0)+'</td><td>'+(r.follows_user?'✓':'')+'</td></tr>').join('')||'<tr><td colspan=5 class="muted">없음</td></tr>');
  h+='<h2>게시물 상세 ('+(d.recentPosts||[]).length+')</h2>'+((d.recentPosts||[]).map(dpost).join('')||'<p class="muted">없음</p>');
  return h;
}
// ── 검수(이미지 감사) 탭 ──
async function loadAudit(run){
  if(AUDIT_BUSY)return;AUDIT_BUSY=true;if(LAST)render(LAST);
  try{AUDIT=await api(run?{view:'audit',run:true}:{view:'audit'})}catch(e){AUDIT={error:String(e)}}
  AUDIT_BUSY=false;if(LAST)render(LAST);
}
function auditTab(){
  if(!AUDIT&&!AUDIT_BUSY)loadAudit();
  if(!AUDIT)return'<p class="muted">검수 현황 불러오는 중…</p>';
  if(AUDIT.error)return'<p class="err">불러오기 실패: '+esc(AUDIT.error)+'</p>';
  const s=AUDIT.stats||{},rr=AUDIT.runResult;
  let h='<div class="kpis">'
    +kpi(N(s.total),'페르소나 게시물')
    +kpi(N(s.audited),'검수 완료')
    +kpi(N(s.pending),'검수 대기')
    +kpi(N(s.removedTotal),'삭제된 게시물(누적)')
    +kpi(N(s.imgTotal),'제거된 사진(누적)')
    +'</div>';
  h+='<div class="panel"><h2>🧹 이미지 검수</h2>'
    +'<p class="muted">AI 비전이 외국인 얼굴·기괴/왜곡·해외배경·캡션과 무관한 사진을 판정해 정리해요. 2시간마다 자동 실행되고, 아래 버튼으로 즉시 한 배치(12개)를 돌릴 수 있어요.</p>'
    +'<button style="width:auto;padding:10px 18px" onclick="loadAudit(true)"'+(AUDIT_BUSY||s.pending===0?' disabled':'')+'>'+(AUDIT_BUSY?'검수 중…':(s.pending===0?'검수할 게시물 없음':'지금 검수 실행 (12개)'))+'</button>'
    +(rr?'<p class="muted" style="margin-top:8px">방금 실행: 판정 '+N(rr.audited||0)+' · 게시물 삭제 '+N(rr.removedPosts||0)+' · 사진 제거 '+N(rr.cleanedImgs||0)+' · 통과 '+N(rr.kept||0)+(rr.remaining!=null?' · 남은 대기 '+N(rr.remaining):'')+'</p>':'')
    +'</div>';
  const log=AUDIT.log||[];
  h+='<div class="panel"><h2>🗑 정리 내역 (최근 '+log.length+'건)</h2>'
    +(log.length?log.map(x=>'<div class="ev" style="align-items:flex-start">'
      +(simg(x.image_url)?'<img class="thumb" src="'+simg(x.image_url)+'" loading="lazy" style="width:56px;height:56px;flex:0 0 auto">':'')
      +'<span class="badge" style="background:'+(x.action==='removed_post'?'#e53e3e':'#F5A623')+'">'+(x.action==='removed_post'?'게시물삭제':'사진제거')+'</span>'
      +'<span class="who">'+esc(x.persona_name||x.persona_id||'?')+'</span>'
      +'<span class="tx" style="white-space:normal">'+esc((x.content||'(캡션 없음)').slice(0,80))+'</span>'
      +'<span class="tm">'+rel(x.created_at)+'</span></div>').join('')
    :'<p class="muted">아직 정리 내역이 없어요.</p>')+'</div>';
  return h;
}
// ── 승인 대기(전수 검수) 탭 ──
async function loadPending(){
  if(PEND_BUSY)return;PEND_BUSY=true;if(LAST)render(LAST);
  try{PEND=await api({view:'pending'})}catch(e){PEND={error:String(e)}}
  PEND_BUSY=false;if(LAST)render(LAST);
}
async function approve(kind,id,ok){
  const action=(kind==='post'?(ok?'approve_post':'reject_post'):(ok?'approve_persona':'reject_persona'));
  try{await api({action,id})}catch(e){alert('실패: '+e)}
  await loadPending();
}
async function approveAll(){
  if(!PEND||!(PEND.posts||[]).length)return;
  if(!confirm('대기 게시물 '+PEND.posts.length+'개를 모두 승인할까요?'))return;
  try{await api({action:'approve_post',ids:PEND.posts.map(p=>p.id)})}catch(e){alert('실패: '+e)}
  await loadPending();
}
function pendingTab(){
  if(!PEND&&!PEND_BUSY)loadPending();
  if(!PEND)return'<p class="muted">승인 대기 불러오는 중…</p>';
  if(PEND.error)return'<p class="err">불러오기 실패: '+esc(PEND.error)+'</p>';
  let h='<div class="panel"><h2>🛡 승인 게이트 — 전수 검수</h2><p class="muted">새 페르소나·게시물은 여기서 승인해야 앱에 노출돼요(통매음·음란물 방지). 이미지·내용을 직접 확인하고 승인/거부하세요.</p>'
    +'<div class="kpis"><div class="kpi"><b>'+N(PEND.pendingPersonas)+'</b><span>대기 페르소나</span></div><div class="kpi"><b>'+N(PEND.pendingPosts)+'</b><span>대기 게시물</span></div></div></div>';
  // 대기 페르소나
  if((PEND.personas||[]).length){
    h+='<div class="panel"><h2>👤 새 페르소나 ('+PEND.personas.length+')</h2>'+PEND.personas.map(p=>{const av=p.avatar||{};return'<div class="card"><div class="phead"><b>'+esc(p.name)+'</b> <span class="muted">@'+esc(p.handle||'')+'</span></div>'
      +gal(av.image,av.photos)+(p.bio?'<div class="pbio">📝 '+esc(p.bio)+'</div>':'')+(p.facts?'<div class="pfacts"><b>설정</b>'+esc(p.facts)+'</div>':'')
      +'<div class="row"><button class="okbtn" onclick="approve(\'persona\',\''+p.id+'\',true)">✅ 승인</button><button class="nobtn" onclick="approve(\'persona\',\''+p.id+'\',false)">✕ 거부</button></div></div>'}).join('')+'</div>';
  }
  // 대기 게시물
  h+='<div class="panel"><div style="display:flex;align-items:center;gap:10px"><h2 style="margin:0">🖼 새 게시물 ('+(PEND.posts||[]).length+')</h2>'+((PEND.posts||[]).length?'<button class="okbtn" style="width:auto;margin-left:auto" onclick="approveAll()">모두 승인</button>':'')+'</div>'
    +((PEND.posts||[]).length?PEND.posts.map(p=>{const im=pimgs(p).map(simg).filter(Boolean);return'<div class="dpost"><div class="phead"><b>'+esc(p.personas?p.personas.name:p.persona_id)+'</b><span class="t">'+rel(p.created_at)+' 전</span></div>'
      +(im.length?'<div class="dthumbs">'+im.map(u=>'<img class="dthumb" src="'+u+'" loading="lazy">').join('')+'</div>':'')
      +'<div class="dpc">'+esc(p.content||'(사진)')+'</div>'+(p.location?'<div class="dpmeta">📍'+esc(p.location)+'</div>':'')
      +'<div class="row"><button class="okbtn" onclick="approve(\'post\',\''+p.id+'\',true)">✅ 승인</button><button class="nobtn" onclick="approve(\'post\',\''+p.id+'\',false)">✕ 거부</button></div></div>'}).join(''):'<p class="muted">대기 중인 게시물이 없어요.</p>')+'</div>';
  return h;
}
// ── 학습(AI 데이터/이력) 탭 ──
async function loadTraining(){
  if(TRAIN_BUSY)return;TRAIN_BUSY=true;if(LAST)render(LAST);
  try{TRAIN=await api({view:'training'})}catch(e){TRAIN={error:String(e)}}
  TRAIN_BUSY=false;if(LAST)render(LAST);
}
function trainingTab(){
  if(!TRAIN&&!TRAIN_BUSY)loadTraining();
  if(!TRAIN)return'<p class="muted">학습 현황 불러오는 중…</p>';
  if(TRAIN.error)return'<p class="muted">오류: '+esc(TRAIN.error)+'</p>';
  const c=TRAIN.consent||{},p=TRAIN.pairs||{};
  let h='<div class="panel"><h2>📥 무엇을 수집 중인가</h2>'
    +'<div class="kpis">'+kpi(N(c.yes)+' / '+N(c.total),'학습 동의 유저')
    +kpi(N(p.total),'수집된 (게시물→댓글) 쌍')
    +kpi((p.bySource||[]).map(s=>esc(s.source)+' '+N(s.n)).join(' · ')||'—','소스별')+'</div>';
  if((p.daily||[]).length){const mx=Math.max(...p.daily.map(x=>+x.n),1);
    h+='<div class="muted" style="margin:8px 0 4px">최근 14일 수집량</div><div style="display:flex;gap:3px;align-items:flex-end;height:56px">'
     +p.daily.map(x=>'<div title="'+esc(x.d)+': '+x.n+'" style="flex:1;background:#0095F6;border-radius:2px 2px 0 0;height:'+Math.round(+x.n/mx*100)+'%;min-height:2px"></div>').join('')+'</div>';}
  h+='<p class="muted" style="margin-top:10px">동의한 유저가 페르소나 게시물에 단 댓글만 비식별로 적재됩니다. 이 데이터로 대화 AI를 파인튜닝해 AI 티를 줄입니다.</p></div>';
  // 최근 수집 샘플
  h+='<div class="panel"><h2>🧾 최근 수집 샘플 (게시물 맥락 → 실제 유저 댓글)</h2>';
  h+=(TRAIN.samples||[]).length?TRAIN.samples.map(s=>'<div class="card"><div class="muted" style="font-size:12px">📄 '+esc(s.context||'(맥락 없음)')+'</div><div style="margin-top:4px">💬 <b>'+esc(s.response)+'</b></div><div class="t">'+rel(s.at)+' 전</div></div>').join(''):'<p class="muted">아직 수집된 댓글이 없어요. 유저가 [설정 > 데이터 활용]에서 동의하면 쌓이기 시작합니다.</p>';
  h+='</div>';
  // 학습 이력
  h+='<div class="panel"><h2>🧪 어떻게 학습됐나 (파인튜닝 이력)</h2>';
  h+=(TRAIN.runs||[]).length?tbl('<th>일시</th><th>방식</th><th>베이스 모델</th><th class="n">예제수</th><th>loss</th><th>상태</th><th>결과</th>',
    TRAIN.runs.map(r=>{const st=r.status==='completed'?'✅완료':r.status==='blocked'?'⛔차단':r.status==='failed'?'❌실패':esc(r.status||'');
      const loss=(r.val_loss_start!=null&&r.val_loss_end!=null)?(r.val_loss_start+'→'+r.val_loss_end):'—';
      return'<tr><td>'+rel(r.created_at)+' 전</td><td>'+esc(r.method||'')+'</td><td>'+esc(r.base_model||'')+'<div class="muted" style="font-size:11px">'+esc(r.dataset||'')+'</div></td><td class="n">'+N(r.examples)+'</td><td>'+loss+'</td><td>'+st+'</td><td style="max-width:280px">'+esc(r.result||'')+(r.notes?'<div class="muted" style="font-size:11px">'+esc(r.notes)+'</div>':'')+'</td></tr>';}).join('')):'<tr><td colspan="7" class="muted">학습 이력 없음</td></tr>';
  h+='</div>';
  return h;
}
function setTab(t){TAB=t;if(t==='검수'&&!AUDIT)loadAudit();if(t==='승인'&&!PEND)loadPending();if(t==='학습'&&!TRAIN)loadTraining();if(LAST)render(LAST)}
function render(d){
  const tabs=['분석','승인','게시물','유저','페르소나','검수','학습'];
  const cnt={'게시물':(d.posts||[]).length,'유저':(d.users||[]).length,'페르소나':(d.personas||[]).length,'검수':AUDIT?(AUDIT.stats||{}).pending:null,'승인':PEND?((PEND.pendingPosts||0)+(PEND.pendingPersonas||0)):null,'학습':TRAIN?(TRAIN.pairs||{}).total:null};
  let body=TAB==='분석'?analytics(d):TAB==='승인'?pendingTab():TAB==='게시물'?postsTab(d):TAB==='유저'?usersTab(d):TAB==='검수'?auditTab():TAB==='학습'?trainingTab():personasTab(d);
  document.getElementById('app').innerHTML='<div class="wrap"><div class="live"><span class="dot"></span>실시간 · '+new Date().toLocaleTimeString('ko')+' 갱신</div>'
    +'<div class="tabs">'+tabs.map(t=>'<div class="tab'+(TAB===t?' on':'')+'" onclick="setTab(\''+t+'\')">'+t+(cnt[t]!=null?' ('+cnt[t]+')':'')+'</div>').join('')+'</div>'+body+'</div>';
}
async function refresh(){if(modalOpen)return;try{const d=await api({});LAST=d;render(d)}catch(e){if(e==='forbidden'){document.getElementById('app').innerHTML='<div class="login"><h1>접근 불가</h1><p class="muted">관리자 계정이 아니에요.</p></div>';clearInterval(timer)}else if(e==='unauth'){sessionStorage.removeItem('mv_at');location.reload()}}}
function start(){refresh();clearInterval(timer);timer=setInterval(refresh,12000)}
if(TOKEN)start();
</script></body></html>
